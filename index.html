<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  overflow:hidden;
  text-align:center;
}

/* typing text */
h1{
  margin-top:80px;
  color:#ff4da6;
  font-size:28px;
  overflow:hidden;
  white-space:nowrap;
  border-right:3px solid white;
  width:0;
  animation:typing 4s steps(40,end) forwards;
}

@keyframes typing{
  from{width:0}
  to{width:100%}
}

/* buttons */
.btn{
  padding:10px 15px;
  margin-top:20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.skip1{position:absolute;top:20px;right:20px;}
.skip2{margin-top:20px;}

/* final message */
#final{
  display:none;
  margin-top:30px;
  font-size:20px;
  padding:20px;
  animation:fadeIn 2s ease;
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

/* balloons */
.balloon{
  position:absolute;
  bottom:-50px;
  width:20px;
  height:30px;
  border-radius:50%;
  animation:float 6s linear infinite;
}

@keyframes float{
  to{transform:translateY(-120vh);}
}

/* hearts */
.heart{
  position:absolute;
  color:red;
  font-size:18px;
  animation:float 5s linear infinite;
}

/* fireworks dots */
.firework{
  position:absolute;
  width:6px;
  height:6px;
  background:white;
  border-radius:50%;
}
</style>
</head>

<body>

<h1>🎉 Happy Birthday Gungun (Chheku) 🎉</h1>

<button class="btn skip1" onclick="start1()">Skip</button>

<div id="stage2" style="display:none;">
  <h2>💖 Surprise Started 💖</h2>
  <button class="btn skip2" onclick="start2()">Next</button>
</div>

<div id="final">
  <h2>❤️ I LOVE YOU GUNGUN ❤️</h2>
  <p>
    mera baccha tu hamesha mere saath rhe<br>
    i love you love you so muchh 💖✨
  </p>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mp3">
</audio>

<script>
function start1(){
  document.getElementById("stage2").style.display="block";
  createBalloons();
  createHearts();
  musicPlay();
}

function start2(){
  document.getElementById("final").style.display="block";
  createFireworks();
}

/* 🎵 music */
function musicPlay(){
  let m=document.getElementById("music");
  m.play().catch(()=>{});
}

/* 🎈 balloons */
function createBalloons(){
  for(let i=0;i<20;i++){
    let b=document.createElement("div");
    b.className="balloon";
    b.style.left=Math.random()*window.innerWidth+"px";
    b.style.background=randomColor();
    b.style.animationDuration=(3+Math.random()*5)+"s";
    document.body.appendChild(b);
  }
}

/* ❤️ hearts */
function createHearts(){
  for(let i=0;i<25;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*window.innerWidth+"px";
    h.style.top=Math.random()*window.innerHeight+"px";
    h.style.animationDuration=(3+Math.random()*5)+"s";
    document.body.appendChild(h);
  }
}

/* 🎆 fireworks */
function createFireworks(){
  for(let i=0;i<80;i++){
    let f=document.createElement("div");
    f.className="firework";
    f.style.left=Math.random()*window.innerWidth+"px";
    f.style.top=Math.random()*window.innerHeight+"px";
    document.body.appendChild(f);
  }
}

/* colors */
function randomColor(){
  let c=["#ff4da6","#4dd2ff","#ffff66","#66ff66","#ff9933"];
  return c[Math.floor(Math.random()*c.length)];
}
</script>

</body>
</html>
