<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>
<style>
body {
  margin: 0;
  padding: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
  overflow: hidden;
}

/* First Screen */
.screen {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

h1 {
  font-size: 40px;
  color: hotpink;
  animation: glow 2s infinite;
}

@keyframes glow {
  0% { text-shadow: 0 0 5px red; }
  50% { text-shadow: 0 0 20px yellow; }
  100% { text-shadow: 0 0 5px red; }
}

button {
  padding: 12px 25px;
  font-size: 18px;
  margin-top: 20px;
  border: none;
  border-radius: 20px;
  background: white;
  color: black;
  cursor: pointer;
}

/* Balloons */
.balloon {
  position: absolute;
  bottom: -100px;
  width: 30px;
  height: 40px;
  background: red;
  border-radius: 50%;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% { transform: translateY(0); }
  100% { transform: translateY(-110vh); }
}

/* Hidden page */
#page2 {
  display: none;
  padding: 40px;
}

.big-text {
  font-size: 30px;
  color: gold;
  margin-top: 50px;
  animation: glow 2s infinite;
}
</style>
</head>

<body>

<div id="page1" class="screen">
  <h1>🎁 Ready For Surprise?</h1>
  <button onclick="start()">OK</button>
</div>

<div id="page2" class="screen">
  <h1>🎉 HAPPY BIRTHDAY GUNGUN 🎉</h1>
  <div class="big-text">
    I love you ❤️<br>
    Main bahut lucky hu jo tu meri life me aayi 💕<br>
    Hamesha mere saath rehna 😘<br>
    Happy Birthday meri jaan 🎂
  </div>
</div>

<script>
function start() {
  document.getElementById("page1").style.display = "none";
  document.getElementById("page2").style.display = "flex";

  // balloons create
  for (let i = 0; i < 25; i++) {
    let b = document.createElement("div");
    b.className = "balloon";
    b.style.left = Math.random() * window.innerWidth + "px";
    b.style.background = `hsl(${Math.random()*360},100%,60%)`;
    b.style.animationDuration = (3 + Math.random() * 5) + "s";
    document.body.appendChild(b);
  }
}
</script>

</body>
</html>
