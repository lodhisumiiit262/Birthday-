<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Surprise Letter</title>

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* link page */
#linkPage{
text-align:center;
}

a{
font-size:25px;
color:pink;
text-decoration:none;
border:2px solid white;
padding:10px 20px;
border-radius:20px;
}

/* letter box */
#letterPage{
display:none;
text-align:center;
padding:20px;
}

.box{
background:white;
color:black;
padding:25px;
border-radius:15px;
max-width:300px;
box-shadow:0 0 20px pink;
}

/* buttons */
button{
padding:10px 20px;
margin:10px;
font-size:16px;
border:none;
border-radius:20px;
cursor:pointer;
}

.yes{background:lime;}
.no{background:red;color:white;}
</style>

</head>

<body>

<!-- LINK PAGE -->
<div id="linkPage">
<a href="#" onclick="openLetter()">💌 Tap Here</a>
</div>

<!-- LETTER PAGE -->
<div id="letterPage">
<h2>✨ OPEN IT ✨</h2>

<div class="box">
Hey ❤️<br><br>
I have something special for you 🎁<br>
Do you want to see it?
</div>

<br>

<button class="yes" onclick="goNext()">YES</button>
<button class="no" onclick="stay()">NO</button>

</div>

<script>

function openLetter(){
document.getElementById("linkPage").style.display="none";
document.getElementById("letterPage").style.display="block";
}

function goNext(){
alert("Great ❤️ Next Surprise coming...");
}

function stay(){
alert("Please come back 😢");
}

</script>

</body>
</html>
