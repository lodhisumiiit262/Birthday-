<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
height:100vh;
overflow:hidden;
background:black;
color:white;
}

/* ---------- FIRST SCREEN ---------- */
#startScreen{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#000,#1a1a1a);
}

h1{
font-size:40px;
text-align:center;
color:#ff4d6d;
margin-bottom:20px;
}

input{
padding:12px;
font-size:18px;
border-radius:10px;
border:none;
outline:none;
text-align:center;
}

button{
margin-top:15px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:#ff4d6d;
color:white;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

/* ---------- SURPRISE SCREEN ---------- */
#surprise{
display:none;
height:100vh;
position:relative;
background:black;
overflow:hidden;
}

/* typing text */
#text{
position:absolute;
top:40%;
width:100%;
text-align:center;
font-size:30px;
color:#fff;
}

/* big message */
#big{
position:absolute;
top:55%;
width:100%;
text-align:center;
font-size:45px;
font-weight:bold;
color:#ff4d6d;
animation:zoom 2s ease-in-out infinite alternate;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

/* balloons */
.balloon{
position:absolute;
bottom:-100px;
width:40px;
height:50px;
background:red;
border-radius:50%;
animation:float 6s linear infinite;
opacity:0.7;
}

@keyframes float{
to{
transform:translateY(-110vh);
}
}

/* hearts */
.heart{
position:absolute;
color:red;
font-size:20px;
animation:rise 5s linear infinite;
}

@keyframes rise{
to{
transform:translateY(-120vh);
opacity:0;
}
}
</style>
</head>

<body>

<!-- FIRST SCREEN -->
<div id="startScreen">
<h1>🎁 Ready for Surprise?</h1>
<input id="pass" placeholder="Enter Password">
<button onclick="check()">Open</button>
</div>

<!-- SURPRISE SCREEN -->
<div id="surprise">
<div id="text"></div>
<div id="big">Happy Birthday ❤️ Gungun</div>
</div>

<script>
function check(){
let p = document.getElementById("pass").value;

if(p.toLowerCase() === "gungun"){
document.getElementById("startScreen").style.display="none";
document.getElementById("surprise").style.display="block";

typeText();
spawnEffects();
}
else{
alert("Wrong Password 😜");
}
}

/* typing effect */
let msg = "You are the most special person in my life ❤️";
let i=0;

function typeText(){
if(i < msg.length){
document.getElementById("text").innerHTML += msg.charAt(i);
i++;
setTimeout(typeText,80);
}
}

/* balloons + hearts */
function spawnEffects(){

setInterval(()=>{

let b = document.createElement("div");
b.className="balloon";
b.style.left=Math.random()*100+"vw";
b.style.background=["#ff4d6d","#ffcc00","#00d4ff","#7cff00"][Math.floor(Math.random()*4)];
document.body.appendChild(b);
setTimeout(()=>b.remove(),6000);

let h = document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.top="100vh";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);

},300);
}
</script>

</body>
</html>
