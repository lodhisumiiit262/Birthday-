<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surprise</title>

<style>
*{
  margin:0;
  padding:0;
  font-family:Arial;
  box-sizing:border-box;
}

body{
  height:100vh;
  overflow:hidden;
  background:#0b0f2a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* center box */
.box{
  text-align:center;
  padding:30px;
}

/* input */
input{
  padding:10px;
  font-size:18px;
  border-radius:10px;
  border:none;
  outline:none;
  margin-top:15px;
}

/* button */
button{
  padding:10px 20px;
  margin-top:15px;
  border:none;
  border-radius:20px;
  background:#ff4da6;
  color:white;
  cursor:pointer;
  font-size:16px;
}

button:hover{
  transform:scale(1.05);
}

/* skip button */
#skip{
  position:absolute;
  right:20px;
  bottom:20px;
  background:#ffd93d;
  color:black;
}

/* big text */
.big{
  font-size:40px;
  font-weight:bold;
  text-align:center;
}

/* balloon */
.balloon{
  position:absolute;
  bottom:-100px;
  width:30px;
  height:40px;
  border-radius:50%;
  animation:up 5s linear forwards;
}

@keyframes up{
  from{transform:translateY(0);}
  to{transform:translateY(-120vh);}
}

/* romantic page */
.romantic{
  text-align:center;
  padding:30px;
  max-width:600px;
}

</style>
</head>

<body>

<div class="box" id="screen">
  <h1>✨ Ready for Surprise ✨</h1>
  <input type="password" id="pass" placeholder="Enter password">
  <br>
  <button onclick="check()">Enter</button>
</div>

<button id="skip" onclick="skip()">Skip ▶</button>

<script>

function check(){
  let p = document.getElementById("pass").value;
  if(p === "gungun"){
    showBirthday();
  }else{
    alert("Wrong password!");
  }
}

function skip(){
  showBirthday();
}

function showBirthday(){
  document.body.innerHTML = `
    <div class="box">
      <div class="big">
        🎉 HAPPY BIRTHDAY GUNGUN 🎉<br><br>
        मेरा बच्चा चीखू ❤️<br>
        I LOVE YOU 💖
      </div>
      <button onclick="romanticPage()">Next ▶</button>
    </div>
  `;

  // balloons
  for(let i=0;i<25;i++){
    let b = document.createElement("div");
    b.className = "balloon";
    b.style.left = Math.random()*100 + "vw";
    b.style.background = ["red","yellow","blue","pink","orange"][i%5];
    b.style.animationDuration = (3+Math.random()*3)+"s";
    document.body.appendChild(b);

    setTimeout(()=>b.remove(),6000);
  }
}

function romanticPage(){
  document.body.innerHTML = `
    <div class="romantic">
      <h1>💌 Special Message 💌</h1>
      <p style="font-size:18px; margin-top:20px; line-height:1.6;">
        Tum meri life ka sabse beautiful part ho ❤️<br><br>
        Har din tumhari smile dekhna hi mera favorite moment hai 😊<br><br>
        Main hamesha tumhare saath rahunga, chahe kuch bhi ho 💕<br><br>
        You are my happiness, my peace, my everything 💖
      </p>
      <button onclick="location.reload()">Replay 🔁</button>
    </div>
  `;
}

</script>

</body>
</html>
