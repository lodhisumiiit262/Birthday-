<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise 💖</title>
<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow:hidden;
}

.slide{
display:none;
height:100vh;
width:100%;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.active{
display:flex;
animation:fade 1s ease;
}

@keyframes fade{
from{opacity:0; transform:scale(0.9);}
to{opacity:1; transform:scale(1);}
}

h1{
font-size:3em;
color:pink;
}

p{
font-size:1.6em;
max-width:850px;
line-height:1.7;
}

button{
position:fixed;
bottom:30px;
right:30px;
padding:15px 25px;
font-size:18px;
background:pink;
border:none;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#ff4d6d;
color:white;
}
</style>
</head>

<body>

<!-- SLIDE 1 -->
<div class="slide active">
<h1>🎉 Ready for Surprise 🎉</h1>
<p>Ek special message tumhare liye...</p>
</div>

<!-- SLIDE 2 -->
<div class="slide">
<h1>🎂 Happy Birthday 🎂</h1>
<p>Gungun 💖</p>
</div>

<!-- SLIDE 3 (YOUR EXACT MESSAGE) -->
<div class="slide">
<h1>💖 Special Message 💖</h1>
<p>
Happy Birthday gungun mera betaa ❤️
