<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* Center screens */
.screen{
  width:100vw;
  height:100vh;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

/* Active screen */
.active{display:flex;}

/* Input */
input{
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  text-align:center;
}

/* Buttons */
button{
  margin-top:15px;
  padding:12px 25px;
  border:none;
  border-radius:25px;
  background:#ff2e63;
  color:white;
  font-size:18px;
  cursor:pointer;
}

/* Big text */
h1{
  font-size:50px;
  color:#ffcc00;
}

p{
  font-size:22px;
  margin-top:10px;
  max-width:80%;
}

/* Skip */
.skip{
  position:absolute;
  bottom:20px;
  right:20px;
  background:#ffffff20;
}

/* Balloons */
.balloon{
  position:absolute;
  bottom:-100px;
  width:40px;
  height:50px;
  background:red;
  border-radius:50%;
  animation:float 6s linear infinite;
}

@keyframes float{
  from{transform:translateY(0);}
  to{transform:translateY(-110vh);}
}
</style>
</head>

<body>

<!-- SCREEN 1 -->
<div class="screen active" id="s1">
  <h1>Ready for Surprise 🎁</h1>
  <p>Enter Password</p>
  <input type="password" id="pass" placeholder="Enter code">
  <button onclick="checkPass()">Enter</button>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="s2">
  <h1>🎉 Welcome Gungun 🎉</h1>
  <p>Tap Next for Surprise</p>
  <button onclick="next()">Next</button>
</div>

<!-- SCREEN 3 -->
<div class="screen" id="s3">
  <h1>💖 Happy Birthday 💖</h1>
  <p><b>Gungun (Cheeku)</b> you are special in my life...</p>
  <button onclick="nextSlide()">Next Message</button>
</div>

<!-- SCREEN 4 -->
<div class="screen" id="s4">
  <h1>❤️ Message ❤️</h1>
  <p>I love you so much, you are my happiness...</p>
  <button onclick="nextSlide2()">Next</button>
</div>

<!-- FINAL -->
<div class="screen" id="s5">
  <h1>🎂 Happy Birthday My Love 🎂</h1>
  <p>You are my world 💕</p>
</div>

<button class="skip" onclick="skipAll()">Skip ▶</button>

<script>

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function checkPass(){
  let p = document.getElementById("pass").value;
  if(p === "gungun"){
    show("s2");
  } else {
    alert("Wrong Password");
  }
}

function next(){
  show("s3");
}

function nextSlide(){
  show("s4");
}

function nextSlide2(){
  startBalloons();
  show("s5");
}

/* Skip full story */
function skipAll(){
  startBalloons();
  show("s5");
}

/* Balloon animation */
function startBalloons(){
  for(let i=0;i<30;i++){
    let b = document.createElement("div");
    b.className = "balloon";
    b.style.left = Math.random()*100 + "vw";
    b.style.background = randomColor();
    b.style.animationDuration = (3+Math.random()*5) + "s";
    document.body.appendChild(b);
  }
}

function randomColor(){
  let colors=["red","pink","yellow","blue","orange","purple"];
  return colors[Math.floor(Math.random()*colors.length)];
}

</script>

</body>
</html>
