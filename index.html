<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  background: radial-gradient(circle at top,#1b2735,#090a0f);
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

/* Main Card */
.card{
  text-align:center;
  padding:40px;
  border-radius:20px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  box-shadow: 0 0 30px rgba(255, 77, 166, 0.2);
  animation: fadeIn 1.5s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:scale(0.8);}
  to{opacity:1; transform:scale(1);}
}

h1{
  font-size:48px;
  font-weight:700;
  background: linear-gradient(90deg,#ff4da6,#ffd93d,#6a5acd);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation: glow 2s infinite alternate;
}

@keyframes glow{
  from{filter: drop-shadow(0 0 5px #ff4da6);}
  to{filter: drop-shadow(0 0 20px #ffd93d);}
}

p{
  margin-top:15px;
  font-size:18px;
  opacity:0.9;
}

/* Button */
button{
  margin-top:25px;
  padding:12px 35px;
  font-size:16px;
  border:none;
  border-radius:50px;
  cursor:pointer;
  background:linear-gradient(90deg,#ff4da6,#ff1f8f);
  color:white;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
}

/* Floating hearts */
.heart{
  position:absolute;
  bottom:-20px;
  font-size:20px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp{
  0%{transform:translateY(0) scale(1); opacity:1;}
  100%{transform:translateY(-110vh) scale(1.5); opacity:0;}
}
</style>
</head>

<body>

<div class="card" id="main">
  <h1>🎉 Happy Birthday Gungun 🎉</h1>
  <p>A special day deserves a special surprise ✨</p>
  <button onclick="nextPage()">Enter Surprise ▶</button>
</div>

<script>
function nextPage(){
  document.body.innerHTML = `
    <div class="card">
      <h1>🎂 Surprise Unlocked 🎂</h1>
      <p>You are the reason for this smile 💖</p>
      <button onclick="location.reload()">Replay</button>
    </div>
  `;
}

/* Floating hearts generator */
setInterval(()=>{
  let h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "❤️";
  h.style.left = Math.random()*100 + "vw";
  h.style.fontSize = (15 + Math.random()*20) + "px";
  h.style.animationDuration = (4 + Math.random()*3) + "s";
  document.body.appendChild(h);

  setTimeout(()=>h.remove(),7000);
},300);
</script>

</body>
</html>
