<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  height:100vh;
  background: linear-gradient(to top, #ffdde1, #ee9ca7);
  overflow:hidden;
}

/* Center box */
.container{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

/* Button */
button{
  padding:15px 30px;
  font-size:18px;
  border:none;
  border-radius:30px;
  background:#ff4081;
  color:white;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  transform:scale(1.1);
}

/* Hidden screen */
.screen{
  display:none;
}

/* Balloons */
.balloon{
  position:absolute;
  bottom:-150px;
  width:40px;
  height:50px;
  background:red;
  border-radius:50%;
  animation: floatUp 6s infinite;
}

@keyframes floatUp{
  0%{transform:translateY(0);}
  100%{transform:translateY(-120vh);}
}

/* Hearts */
.heart{
  position:absolute;
  color:red;
  font-size:24px;
  animation: floatUp 5s infinite;
}

/* Final text */
.final-message{
  font-size:24px;
  color:#fff;
  padding:20px;
  line-height:1.6;
  font-weight:bold;
  animation: fadeIn 2s ease-in-out;
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}

</style>
</head>
<body>

<div class="container" id="start">
  <h1>🎁 Ready for Surprise</h1>
  <button onclick="showSurprise()">Open</button>
</div>

<div class="container screen" id="surprise">
  <h1>🎉 Happy Birthday Gungun 🎉</h1>
  <button onclick="showEnd()">Next</button>
</div>

<div class="container screen" id="end">

  <div class="final-message">
    I love you gungun ❤️<br><br>
    Happy birthday mere bacche ko 🎂<br>
    Aise he mere saath rehna hamesha 💞<br>
    Iss baar ka birthday toh aise he gya 😔<br>
    Par pakka promise wala saath celebrate karege 💍<br>
    Promise my dear 😘
  </div>

</div>

<script>

// balloons + hearts generator
function createEffects(){
  setInterval(()=>{
    let b = document.createElement("div");
    b.className="balloon";
    b.style.left = Math.random()*100+"vw";
    b.style.background = ["#ff4d6d","#ffcc00","#4dd0e1","#7e57c2"][Math.floor(Math.random()*4)];
    document.body.appendChild(b);
    setTimeout(()=>b.remove(),6000);
  },400);

  setInterval(()=>{
    let h = document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left = Math.random()*100+"vw";
    h.style.top = "100vh";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
  },500);
}

function showSurprise(){
  document.getElementById("start").style.display="none";
  document.getElementById("surprise").style.display="flex";
}

function showEnd(){
  document.getElementById("surprise").style.display="none";
  document.getElementById("end").style.display="flex";
  createEffects();
}

</script>

</body>
</html>
