<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial;
overflow:hidden;
}

/* COMMON SCREEN */
.screen{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
}

.active{
display:flex;
}

/* TEXT */
h1{
font-size:3em;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:pink;
cursor:pointer;
margin-top:20px;
}

/* INPUT */
input{
padding:10px;
font-size:18px;
border-radius:8px;
border:none;
text-align:center;
}

/* ANIMATION TEXT */
.big-text{
font-size:4em;
font-weight:bold;
color:#ff4d6d;
animation:pop 1s infinite alternate;
}

@keyframes pop{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

/* BALLONS + HEARTS */
.balloon, .heart{
position:absolute;
font-size:30px;
animation:floatUp 5s linear infinite;
}

@keyframes floatUp{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}
</style>
</head>

<body>

<!-- SCREEN 1 -->
<div class="screen active" id="s1">
<h1>READY FOR SURPRISE 🎁</h1>
<button onclick="go(2)">OK</button>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="s2">
<h1>ENTER PASSWORD</h1>
<input type="password" id="pass" placeholder="password">
<button onclick="checkPass()">Submit</button>
</div>

<!-- SCREEN 3 -->
<div class="screen" id="s3">
<h1 class="big-text">HAPPY BIRTHDAY GUNGUN 🎉</h1>
<button onclick="go(4)">NEXT ➡</button>
</div>

<!-- SCREEN 4 -->
<div class="screen" id="s4">
<h1>🎂 HAPPY BIRTHDAY CHEEKU 🎂</h1>
<p style="font-size:1.5em">
i love youu so much 💖<br>
apn hamesha aise he saath rhee 🫂
</p>
</div>

<script>
function go(n){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");

if(n==4){
startEffects();
}
}

function checkPass(){
let p = document.getElementById("pass").value;
if(p === "gungun"){
go(3);
}else{
alert("Wrong password ❌");
}
}

/* BALLONS + HEARTS */
function startEffects(){
setInterval(()=>{
let b = document.createElement("div");
b.className="balloon";
b.innerHTML="🎈";
b.style.left=Math.random()*100+"vw";
document.body.appendChild(b);
setTimeout(()=>b.remove(),5000);
},300);

setInterval(()=>{
let h = document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
},400);
}
</script>

</body>
</html>
